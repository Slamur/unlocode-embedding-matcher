[tool.black]
line-length = 100
target-version = ["py312"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # import sorting
]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"

warn_unused_configs = true
warn_return_any = false

ignore_missing_imports = true
check_untyped_defs = true

pretty = true
show_error_codes = true

mypy_path = "src"
